{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predict Price | AI Valuation</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: url("{% static '6_3.jpg' %}") no-repeat center center fixed;
            background-size: cover; color: #fff;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.75); z-index: -1;
        }

        .main {
            max-width: 800px; margin: 60px auto; padding: 40px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-in-out;
            position: relative;
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: scale(0.95); } 
            to { opacity: 1; transform: scale(1); } 
        }

        h1 { text-align: center; color: #38bdf8; font-size: 38px; margin-bottom: 30px; letter-spacing: 1px; }

        .form-row { display: flex; flex-wrap: wrap; justify-content: space-between; }
        .form-group { flex: 0 0 48%; margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; font-weight: 600; color: #cbd5e1; letter-spacing: 1px; }

        input, select {
            width: 100%; padding: 14px; border-radius: 12px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; font-size: 16px; transition: 0.3s; box-sizing: border-box;
        }

        input:focus, select:focus { 
            outline: none; border-color: #38bdf8; 
            background: rgba(255, 255, 255, 0.2); 
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); 
        }
        
        select option { background: #1e293b; color: white; }

        .btn-predict {
            width: 100%; background: linear-gradient(135deg, #38bdf8, #3b82f6);
            color: white; padding: 18px; border: none; border-radius: 12px;
            font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s;
            margin-top: 10px; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4);
            letter-spacing: 1px;
        }

        .btn-predict:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(59, 130, 246, 0.6); }

        .btn-history {
            display: block; width: 100%; text-align: center; margin-top: 20px; box-sizing: border-box;
            background: transparent; color: #94a3b8; border: 1px solid #94a3b8;
            padding: 12px; border-radius: 12px; text-decoration: none; transition: 0.3s;
        }
        .btn-history:hover { background: #94a3b8; color: #0f172a; font-weight: bold;}

        .result-box {
            margin-top: 30px; padding: 20px; background: rgba(56, 189, 248, 0.2);
            border-left: 5px solid #38bdf8; border-radius: 8px; text-align: center;
            font-size: 24px; font-weight: bold; color: #fff;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* SCANNER ANIMATION */
        #loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 9999; display: none; flex-direction: column;
            justify-content: center; align-items: center; color: #38bdf8;
        }

        .scanner {
            width: 150px; height: 150px; border: 2px solid rgba(56, 189, 248, 0.2);
            border-radius: 50%; position: relative; box-shadow: 0 0 40px rgba(56, 189, 248, 0.3); overflow: hidden;
        }

        .scanner::before {
            content: ''; position: absolute; top: 0; left: 50%; width: 50%; height: 100%; 
            background: linear-gradient(to right, transparent, #38bdf8);
            transform-origin: left center; animation: radar 1.5s linear infinite;
        }

        .scanner::after {
            content: ''; position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px;
            background: #0f172a; border-radius: 50%;
        }

        .scanner .dot {
            position: absolute; width: 10px; height: 10px; background: #38bdf8; border-radius: 50%;
            top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; box-shadow: 0 0 15px #38bdf8;
        }

        @keyframes radar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .loader-text { margin-top: 40px; font-size: 22px; font-weight: bold; letter-spacing: 3px; animation: pulseText 1.5s infinite; }
        .loader-subtext { margin-top: 10px; font-size: 14px; color: #94a3b8; letter-spacing: 1px; animation: fadeInOut 2s infinite; }
        @keyframes pulseText { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; text-shadow: 0 0 15px #38bdf8; } }
        @keyframes fadeInOut { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>

    <!-- Full Screen Loader Overlay -->
    <div id="loader-overlay">
        <div class="scanner"><div class="dot"></div></div>
        <div class="loader-text">AI IS ANALYZING PROPERTY</div>
        <div class="loader-subtext">Evaluating Budget, Age, and Furnishing Constraints...</div>
    </div>

    <div class="main">
        <h1>Property Valuation AI</h1>
        
        <form action="/result/" method="GET" onsubmit="showLoader(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>Purchase Budget (₹)</label>
                    <input type="number" name="J1" required placeholder="Min amount based on BHK">
                </div>
                <div class="form-group">
                    <label>House Age (0-15 Yrs)</label>
                    <input type="number" name="J2" max="15" min="0" required>
                </div>

                <div class="form-group">
                    <label>Number of Bedrooms (BHK)</label>
                    <select name="J3" required>
                        <option value="" disabled selected>Select BHK</option>
                        <option value="1">1 BHK</option>
                        <option value="1.5">1.5 BHK</option>
                        <option value="2">2 BHK</option>
                        <option value="2.5">2.5 BHK</option>
                        <option value="3">3 BHK</option>
                        <option value="3.5">3.5 BHK</option>
                        <option value="4">4 BHK</option>
                        <option value="4.5">4.5 BHK</option>
                        <option value="5">5 BHK</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Area's Resident Population</label>
                    <input type="number" name="J4" required>
                </div>

                <div class="form-group" style="flex: 0 0 100%;">
                    <label>City</label>
                    <select name="J5" required>
                        <option value="" disabled selected>Select a city</option>
                        <option>Agra</option>
                        <option>Ahmedabad</option>
                        <option>Amritsar</option>
                        <option>Bengaluru</option>
                        <option>Chennai</option>
                        <option>Delhi</option>
                        <option>Hyderabad</option>
                        <option>Jaipur</option>
                        <option>Kolkata</option>
                        <option>Lucknow</option>
                        <option>Mumbai</option>
                        <option>Pune</option>
                        <!-- Add remaining cities here -->
                    </select>
                </div>

                <div class="form-group" style="flex: 0 0 100%;">
                    <label>Furnishing Status</label>
                    <select name="J6" required>
                        <option value="" disabled selected>Select furnishing status</option>
                        <option>Unfurnished</option>
                        <option>Semi-furnished</option>
                        <option>Fully furnished</option>
                    </select>
                </div>
            </div>
            
            <button type="submit" class="btn-predict">PREDICT PRICE</button>
        </form>

        <a href="/history/" class="btn-history">Show recent Predictions</a>

        {% if result2 %}
        <div class="result-box">{{ result2 }}</div>
        {% endif %}
    </div>

    <!-- JavaScript to trigger the Radar loading animation -->
    <script>
        function showLoader(event) {
            event.preventDefault(); // Stop instant submission
            document.getElementById('loader-overlay').style.display = 'flex'; // Show Radar
            setTimeout(() => {
                event.target.submit(); // Submit after 2 seconds
            }, 2000);
        }
    </script>
</body>
</html>
